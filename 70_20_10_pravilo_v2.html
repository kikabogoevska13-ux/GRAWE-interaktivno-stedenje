
<h2 class="sr-only">Интерактивен калкулатор за правилото 70/20/10</h2>

<div style="display:flex; align-items:center; gap:12px; margin-bottom:1.5rem;">
  <label style="font-size:14px; color:var(--color-text-secondary); white-space:nowrap;">Месечна плата</label>
  <input type="range" id="salary" min="15000" max="100000" step="1000" value="35000" style="flex:1;">
  <span id="salary-out" style="font-size:14px; font-weight:500; min-width:68px; text-align:right; color:var(--color-text-primary);">35.000 ден.</span>
</div>

<div style="display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-bottom:1.5rem;">
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-lg); padding:16px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <div style="width:12px;height:12px;border-radius:2px;background:#185FA5; flex-shrink:0;"></div>
      <span style="font-size:13px; color:var(--color-text-secondary);">Потреби</span>
    </div>
    <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px;">
      <input type="range" id="s-need" min="30" max="80" step="1" value="70" style="flex:1;">
      <span id="pct-need" style="font-size:13px; font-weight:500; min-width:30px; color:var(--color-text-primary);">70%</span>
    </div>
    <div id="amt-need" style="font-size:22px; font-weight:500; color:var(--color-text-primary);">24.500</div>
    <div style="font-size:11px; color:var(--color-text-tertiary); margin-top:2px;">ден. / месец</div>
  </div>

  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-lg); padding:16px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <div style="width:12px;height:12px;border-radius:2px;background:#993C1D; flex-shrink:0;"></div>
      <span style="font-size:13px; color:var(--color-text-secondary);">Желби</span>
    </div>
    <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px;">
      <input type="range" id="s-want" min="5" max="40" step="1" value="20" style="flex:1;">
      <span id="pct-want" style="font-size:13px; font-weight:500; min-width:30px; color:var(--color-text-primary);">20%</span>
    </div>
    <div id="amt-want" style="font-size:22px; font-weight:500; color:var(--color-text-primary);">7.000</div>
    <div style="font-size:11px; color:var(--color-text-tertiary); margin-top:2px;">ден. / месец</div>
  </div>

  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-lg); padding:16px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <div style="width:12px;height:12px;border-radius:2px;background:#0F6E56; flex-shrink:0;"></div>
      <span style="font-size:13px; color:var(--color-text-secondary);">Штедење</span>
    </div>
    <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px;">
      <input type="range" id="s-save" min="5" max="40" step="1" value="10" style="flex:1;">
      <span id="pct-save" style="font-size:13px; font-weight:500; min-width:30px; color:var(--color-text-primary);">10%</span>
    </div>
    <div id="amt-save" style="font-size:22px; font-weight:500; color:var(--color-text-success);">3.500</div>
    <div style="font-size:11px; color:var(--color-text-tertiary); margin-top:2px;">ден. / месец</div>
  </div>
</div>

<div id="total-bar" style="height:28px; border-radius:6px; overflow:hidden; display:flex; margin-bottom:8px;"></div>

<div id="warning" style="font-size:13px; color:var(--color-text-danger); margin-bottom:1rem; min-height:18px;"></div>

<div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;">
  <span style="font-size:13px; color:var(--color-text-secondary);">За 1 година штедење</span>
  <span id="yearly" style="font-size:18px; font-weight:500; color:var(--color-text-success);">42.000 ден.</span>
</div>

<div style="display:flex; gap:10px; flex-wrap:wrap;">
  <button onclick="reset()">Ресетирај на 70/20/10</button>
  <a href="https://kikabogoevska13-ux.github.io/index.htmlfile-C-Users-Dell-Downloads-kade_odat_parite_70_20_10.html" style="display:inline-block; padding:8px 16px; border-radius:6px; background:var(--color-background-accent); color:var(--color-text-on-accent); text-decoration:none; font-size:14px; font-weight:500;">Следен чекор ↗</a>
</div>

<script>
function fmt(n){ return Math.round(n).toLocaleString('mk-MK'); }

function render(){
  const salary = parseInt(document.getElementById('salary').value);
  const need = parseInt(document.getElementById('s-need').value);
  const want = parseInt(document.getElementById('s-want').value);
  const save = parseInt(document.getElementById('s-save').value);
  const total = need + want + save;

  document.getElementById('salary-out').textContent = fmt(salary) + ' ден.';
  document.getElementById('pct-need').textContent = need + '%';
  document.getElementById('pct-want').textContent = want + '%';
  document.getElementById('pct-save').textContent = save + '%';
  document.getElementById('amt-need').textContent = fmt(salary * need / 100);
  document.getElementById('amt-want').textContent = fmt(salary * want / 100);
  document.getElementById('amt-save').textContent = fmt(salary * save / 100);
  document.getElementById('yearly').textContent = fmt(salary * save / 100 * 12) + ' ден.';

  const bar = document.getElementById('total-bar');
  bar.innerHTML = `
    <div style="width:${need/total*100}%;background:#185FA5;transition:width .25s;"></div>
    <div style="width:${want/total*100}%;background:#993C1D;transition:width .25s;"></div>
    <div style="width:${save/total*100}%;background:#0F6E56;transition:width .25s;"></div>
  `;

  const warn = document.getElementById('warning');
  if(total > 100) warn.textContent = 'Збирот е ' + total + '% — намали некоја категорија.';
  else if(total < 100) warn.textContent = 'Збирот е ' + total + '% — ' + (100-total) + '% нераспределено.';
  else warn.textContent = '';
}

function reset(){
  document.getElementById('s-need').value = 70;
  document.getElementById('s-want').value = 20;
  document.getElementById('s-save').value = 10;
  render();
}

['salary','s-need','s-want','s-save'].forEach(id =>
  document.getElementById(id).addEventListener('input', render)
);
render();
</script>
